# Signed + notarized build. Requires an Apple Developer ID Application
# certificate in the login Keychain and these environment variables:
#
#   APPLE_ID                    your Apple ID email
#   APPLE_APP_SPECIFIC_PASSWORD app-specific password from appleid.apple.com
#   APPLE_TEAM_ID               10-char team id (developer.apple.com → Membership)
#
# Run with: npm run package:signed
# The identity is auto-discovered from the Keychain (no identity: null here).
appId: com.smartbrief.desktop
productName: Smart Brief
directories:
  output: release
files:
  - dist/**
  - package.json
mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  target:
    - target: dir
      arch:
        - arm64
    - target: dmg
      arch:
        - arm64
dmg:
  title: Smart Brief
npmRebuild: false
